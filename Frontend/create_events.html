<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>SlotWise: Create Event</title>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&amp;display=swap" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .input-transition {
            transition: all 0.2s ease-in-out;
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-slate-800 dark:text-slate-100 antialiased min-h-screen flex flex-col">
    <header
        class="w-full h-16 flex items-center justify-between px-6 lg:px-12 bg-white dark:bg-card-dark border-b border-slate-200 dark:border-slate-800 z-50 sticky top-0">
        <div class="flex items-center gap-10">
            <div class="flex items-center gap-2">
                <div class="bg-primary flex items-center justify-center rounded-lg size-8 text-slate-900">
                    <span class="material-symbols-outlined text-[20px] font-bold">bolt</span>
                </div>
                <h1 class="text-slate-900 dark:text-white text-lg font-extrabold tracking-tight">SlotWise</h1>
            </div>
            <nav class="hidden md:flex items-center gap-8 h-16">
                <a class="text-sm font-semibold text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white h-full flex items-center border-b-2 border-transparent hover:border-slate-300 dark:hover:border-slate-700 transition-colors"
                    href="dash.html">Dashboard</a>
                <a class="text-sm font-semibold text-slate-900 dark:text-white h-full flex items-center border-b-2 border-primary"
                    href="events.html">Events</a>
                <a class="text-sm font-semibold text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white h-full flex items-center border-b-2 border-transparent hover:border-slate-300 dark:hover:border-slate-700 transition-colors"
                    href="create_events.html">Create Event</a>
                <a class="text-sm font-semibold text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white h-full flex items-center border-b-2 border-transparent hover:border-slate-300 dark:hover:border-slate-700 transition-colors"
                    href="user_management.html">Admin</a>
            </nav>
        </div>
        <div class="flex items-center gap-5">
            <button
                class="text-slate-500 hover:text-slate-900 dark:text-slate-400 dark:hover:text-white flex items-center">
                <span class="material-symbols-outlined">notifications</span>
            </button>
            <div class="flex items-center gap-3 pl-2">
                <div class="hidden sm:flex flex-col text-right">
                    <span class="text-xs font-bold text-slate-900 dark:text-white">Naitik Patel</span>
                    <span
                        class="text-[10px] uppercase tracking-wider text-slate-500 dark:text-slate-400 font-medium">Coordinator</span>
                </div>
                <a href="login.html">
                    <div class="size-9 rounded-full bg-cover bg-center border border-slate-200 dark:border-slate-700"
                        style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDd28PwlWjeul16cjS0ViqRfVlP1ovyQqXiZni5EQ2wQM1I5PM5nj-wf1QXQp-3YPZmW_GbWDBwSpqcUYTOC3JR3-m5fvUKT7_jDcEN6R9Tg-oxV-EnF_eA-UKBEimZU08UDP9PzZmp7Yh8Y0Tsf8Fw9TPKpUPZgw59QZ3bt05Subl8tT-ZaRh9gm7pVuZlExDYncB9N7nw4fyQo6_UbjsL9V-keAnK36w8_0HMlIxvJn_rc6SR3U8OG6QnjwuQBCtOgdwazP9XW_n7');">
                    </div>
                </a>
            </div>
        </div>
    </header>
    <main class="flex-1 flex flex-col items-center justify-center p-4 lg:p-8 relative w-full">
        <div class="absolute top-0 left-1/4 w-96 h-96 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
        <div class="absolute bottom-0 right-1/4 w-96 h-96 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
        <div class="w-full max-w-xl z-10 flex flex-col gap-6">
            <div class="text-center">
                <h2 class="text-3xl font-bold text-slate-900 dark:text-white tracking-tight font-display">Create New
                    Event</h2>
                <p class="text-slate-500 dark:text-slate-400 mt-2">Enter the details below to schedule your event.</p>
            </div>
            <div
                class="bg-white dark:bg-card-dark rounded-xl shadow-soft border border-slate-100 dark:border-slate-800 overflow-hidden relative">
                <div class="h-1 w-full bg-primary opacity-80"></div>
                <form class="p-8 flex flex-col gap-6">
                    <div class="flex flex-col gap-2">
                        <label class="text-sm font-semibold text-slate-700 dark:text-slate-200" for="event-name">Event
                            Name</label>
                        <input
                            class="form-input input-transition w-full rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-background-dark text-slate-800 dark:text-slate-100 placeholder:text-slate-400 px-4 py-3 text-base outline-none focus:border-primary focus:ring-4 focus:ring-primary/20 dark:focus:ring-primary/10"
                            id="event-name" placeholder="e.g., Spring Orientation" type="text" />
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="flex flex-col gap-2">
                            <label class="text-sm font-semibold text-slate-700 dark:text-slate-200"
                                for="event-date">Date</label>
                            <input
                                class="form-input input-transition w-full rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-background-dark text-slate-800 dark:text-slate-100 px-4 py-3 text-base outline-none focus:border-primary focus:ring-4 focus:ring-primary/20 dark:focus:ring-primary/10"
                                id="event-date" type="date" />
                        </div>
                        <div class="flex flex-col gap-2">
                            <label class="text-sm font-semibold text-slate-700 dark:text-slate-200"
                                for="venue">Venue</label>
                            <div class="relative">
                                <select
                                    class="form-select input-transition w-full rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-background-dark text-slate-800 dark:text-slate-100 px-4 py-3 text-base outline-none focus:border-primary focus:ring-4 focus:ring-primary/20 dark:focus:ring-primary/10 appearance-none cursor-pointer"
                                    id="venue">
                                    <option disabled="" selected="" value="">Select Venue</option>
                                    <option value="hall-a">Main Conference Hall A</option>
                                    <option value="hall-b">Meeting Room 101</option>
                                    <option value="audit">East Wing Auditorium</option>
                                    <option value="lab">Innovation Lab 3</option>
                                </select>
                                <span
                                    class="material-symbols-outlined absolute right-3 top-3.5 text-slate-400 pointer-events-none">expand_more</span>
                            </div>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="flex flex-col gap-2">
                            <label class="text-sm font-semibold text-slate-700 dark:text-slate-200"
                                for="start-time">Start Time</label>
                            <div class="relative">
                                <select
                                    class="form-select input-transition w-full rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-background-dark text-slate-800 dark:text-slate-100 px-4 py-3 text-base outline-none focus:border-primary focus:ring-4 focus:ring-primary/20 dark:focus:ring-primary/10 appearance-none cursor-pointer"
                                    id="start-time">
                                    <option disabled="" selected="" value="">Select hour</option>
                                    <option>08:00 AM</option>
                                    <option>09:00 AM</option>
                                    <option>10:00 AM</option>
                                    <option>11:00 AM</option>
                                    <option>12:00 PM</option>
                                    <option>01:00 PM</option>
                                    <option>02:00 PM</option>
                                    <option>03:00 PM</option>
                                    <option>04:00 PM</option>
                                    <option>05:00 PM</option>
                                </select>
                                <span
                                    class="material-symbols-outlined absolute right-3 top-3.5 text-slate-400 pointer-events-none text-[20px]">schedule</span>
                            </div>
                        </div>
                        <div class="flex flex-col gap-2">
                            <label class="text-sm font-semibold text-slate-700 dark:text-slate-200" for="end-time">End
                                Time</label>
                            <div class="relative">
                                <select
                                    class="form-select input-transition w-full rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-background-dark text-slate-800 dark:text-slate-100 px-4 py-3 text-base outline-none focus:border-primary focus:ring-4 focus:ring-primary/20 dark:focus:ring-primary/10 appearance-none cursor-pointer"
                                    id="end-time">
                                    <option disabled="" selected="" value="">Select hour</option>
                                    <option>09:00 AM</option>
                                    <option>10:00 AM</option>
                                    <option>11:00 AM</option>
                                    <option>12:00 PM</option>
                                    <option>01:00 PM</option>
                                    <option>02:00 PM</option>
                                    <option>03:00 PM</option>
                                    <option>04:00 PM</option>
                                    <option>05:00 PM</option>
                                    <option>06:00 PM</option>
                                </select>
                                <span
                                    class="material-symbols-outlined absolute right-3 top-3.5 text-slate-400 pointer-events-none text-[20px]">schedule</span>
                            </div>
                        </div>
                    </div>
                    <div
                        class="flex flex-col-reverse sm:flex-row items-center justify-between gap-4 pt-6 mt-2 border-t border-slate-100 dark:border-slate-800">
                        <a class="w-full sm:w-auto text-center px-6 py-3 text-sm font-semibold text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-slate-200 transition-colors"
                            href="events.html">
                            Cancel
                        </a>
                        <button id="schedule-event-btn"
                            class="group w-full sm:w-auto px-10 py-3 rounded-lg bg-slate-900 dark:bg-slate-100 text-white dark:text-slate-900 hover:bg-primary dark:hover:bg-primary text-sm font-bold shadow-lg shadow-slate-200 dark:shadow-none transition-all duration-300"
                            type="button">
                            Schedule Event
                        </button>
                    </div>
                </form>
            </div>
            <p class="text-center text-xs text-slate-400">
                Double-check availability in the <a
                    class="hover:text-primary transition-colors underline decoration-slate-300 dark:decoration-slate-700 underline-offset-2"
                    href="dash.html">Calendar View</a> before submitting.
            </p>
        </div>
    </main>
    <script src="script.js"></script>
</body>

</html>
